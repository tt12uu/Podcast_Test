name: Update YouTube Podcast Feed

on:
  schedule:
    - cron: '0 */6 * * *' # 每 6 小時自動跑一次
  workflow_dispatch: # 允許手動點火

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo add-apt-repository ppa:tomtomtom/yt-dlp -y
          sudo apt-get update
          sudo apt-get install yt-dlp -y

      - name: Create Base Directories
        run: mkdir -p audio

      - name: Generate Cookies File From Secret
        # 從 GitHub 后台安全變數中取出 Cookie，寫入虛擬機本地檔
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Download Latest 3 Audios via yt-dlp with Cookies
        # 帶埋 Cookie 去抓取頻道影片，並自動下載最新 3 集
        run: |
          yt-dlp --cookies cookies.txt \
                 --playlist-end 3 \
                 --extract-audio \
                 --audio-format m4a \
                 --no-postoverwrites \
                 --ignore-errors \
                 -o "audio/%(id)s.m4a" \
                 "https://www.youtube.com/channel/UCAlVuubC3GE6kFFeNBEkoUQ"

      - name: Run Python Script to Update XML
        run: python update_podcast.py

      - name: Remove Temporary Cookies File
        run: rm -f cookies.txt

      - name: Commit and Push to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add podcast.xml audio/*.m4a || true
          if git diff --staged --quiet; then
            echo "沒有新集數需要更新，跳過 Commit。"
          else
            git commit -m "📥 [Cookie 認證] 自動實體下載最新音訊並更新 RSS Feed"
            git push origin main
          fi

      - name: Deploy to GitHub Pages (Publish Root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: .
          clean: false
