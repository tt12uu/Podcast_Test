name: Update YouTube Podcast Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp
        run: |
          sudo add-apt-repository ppa:tomtomtom/yt-dlp -y
          sudo apt-get update
          sudo apt-get install yt-dlp -y

      - name: Create Audio Directory
        run: mkdir -p audio

      - name: Download Latest 3 Audios via yt-dlp
        # 這裡會自動讀取 YouTube Feed 獲取最新 3 個影片 ID 並用最高效能直接下載 M4A 音訊
        run: |
          curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UCAlVuubC3GE6kFFeNBEkoUQ" | grep -oP '(?<=<yt:videoId>)[^<]+' | head -n 3 | while read -r id; do
            if [ ! -f "audio/${id}.m4a" ]; then
              echo "📥 正在極速下載影片音訊: $id"
              yt-dlp -x --audio-format m4a -o "audio/${id}.m4a" "https://www.youtube.com/watch?v=${id}" || true
            else
              echo "✅ $id 已經存在，跳過下載。"
            fi
          done

      - name: Run Script to Update XML
        run: python update_podcast.py

      - name: Commit and Push to main
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add podcast.xml audio/*.m4a || true
          if git diff --staged --quiet; then
            echo "沒有任何變更，無須 Commit。"
          else
            git commit -m "📥 yt-dlp 實體下載最新音訊並更新 RSS Feed"
            git push origin main
          fi

      - name: Deploy to GitHub Pages (Publish Root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          target-folder: .
          clean: false
